name: openclaw-mission-control

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mission_control}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      # Build from repo root so the backend image can include repo-level assets
      # like `backend/templates/`.
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Override localhost defaults for container networking
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-mission_control}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DB_AUTO_MIGRATE: ${DB_AUTO_MIGRATE:-true}
      AUTH_MODE: ${AUTH_MODE}
      LOCAL_AUTH_TOKEN: ${LOCAL_AUTH_TOKEN}
      BASE_URL: ${BASE_URL:-http://localhost:8000}
      AGENT_BASE_URL: ${AGENT_BASE_URL:-}
      RQ_REDIS_URL: redis://redis:6379/0
      GATEWAY_MIN_VERSION: ${GATEWAY_MIN_VERSION:-2026.02.9}
      # OpenClaw Docker management
      OPENCLAW_DOCKER_ENABLED: ${OPENCLAW_DOCKER_ENABLED:-false}
      OPENCLAW_REPO_PATH: /openclaw-repo
      OPENCLAW_CONFIG_BASE_DIR: /openclaw-configs
      OPENCLAW_CONFIG_HOST_DIR: ${OPENCLAW_CONFIG_HOST_DIR:-./openclaw-configs}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${OPENCLAW_REPO_PATH:-.}:/openclaw-repo:ro
      - ${OPENCLAW_CONFIG_HOST_DIR:-./openclaw-configs}:/openclaw-configs
    # Grant access to Docker socket (GID 0 on macOS Docker Desktop).
    # On Linux, replace with the host's docker group GID.
    group_add:
      - "0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-auto}
        NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE}
    # Optional, user-managed env file.
    # IMPORTANT: do NOT load `.env.example` here because it contains non-empty
    # placeholder Clerk keys, which can accidentally flip Clerk "on".
    env_file:
      - path: ./frontend/.env
        required: false
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-auto}
      NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    develop:
      watch:
        # Rebuild frontend image when UI source or build config changes.
        - action: rebuild
          path: ./frontend/src
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json
        - action: rebuild
          path: ./frontend/next.config.ts
        - action: rebuild
          path: ./frontend/postcss.config.js
        - action: rebuild
          path: ./frontend/tailwind.config.cjs
        - action: rebuild
          path: ./frontend/tsconfig.json

  webhook-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "scripts/rq-docker", "worker"]
    env_file:
      - path: ./backend/.env
        required: false
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-mission_control}
      AUTH_MODE: ${AUTH_MODE}
      LOCAL_AUTH_TOKEN: ${LOCAL_AUTH_TOKEN}
      BASE_URL: ${BASE_URL:-http://localhost:8000}
      AGENT_BASE_URL: ${AGENT_BASE_URL:-}
      RQ_REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-default}
      RQ_DISPATCH_THROTTLE_SECONDS: ${RQ_DISPATCH_THROTTLE_SECONDS:-2.0}
      RQ_DISPATCH_MAX_RETRIES: ${RQ_DISPATCH_MAX_RETRIES:-3}
    restart: unless-stopped

volumes:
  postgres_data:
